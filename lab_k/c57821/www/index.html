<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Jakub Strawa (57821) - PTW LAB D</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
    <div class="container">
        <h1> Pogoda w Twoim mieście</h1>
        <p>Imię: Jakub Strawa | Album: 57821 | Grupa: 252A</p>
 
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Wpisz nazwę miasta, np. Szczecin">
            <button id="getWeatherBtn"> Sprawdź pogodę</button>
        </div>
 
        <div id="currentWeather" class="weather-card">
            <h2> Aktualna pogoda</h2>
            <div id="currentContent">Wpisz miasto i kliknij przycisk</div>
        </div>
 
        <div id="forecastWeather" class="weather-card">
            <h2> Prognoza 5-dniowa</h2>
            <div id="forecastContent" class="forecast-grid"></div>
        </div>
    </div>
 
    <script src="scripts.js"></script>
</body>
</html>
