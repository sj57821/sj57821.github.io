<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PTW Lab C - Jakub Strawa 57821</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Map Puzzle - Układanka</h1>
    <p>Imię: Jakub Strawa | Album: 57821 | Grupa: 212A</p>

    <div id="map-container">
        <div id="map"></div>
        <div id="map-buttons">
            <button id="getLocationBtn"> Moja lokalizacja</button>
            <button id="exportMapBtn"> Pobierz mapę</button>
        </div>
    </div>

    <div id="puzzle-area">
        <h3> Rozsypane puzzle (przeciągnij na planszę)</h3>
        <div id="puzzle-pieces" class="puzzle-grid"></div>
    </div>

    <div id="board-area">
        <h3> Plansza do układania (ułóż wszystkie 16)</h3>
        <div id="board" class="puzzle-grid"></div>
    </div>

    <div id="message"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="scripts.js"></script>
    
</body>
</html>
