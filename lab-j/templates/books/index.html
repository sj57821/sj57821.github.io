{% extends "layout.html" %}

{% block title %}Posts List{% endblock %}

{% block body %}
    <h1>Posts List</h1>

    <a href="/books/new">Create new</a>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Year</th>
            <th>Actions</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.id }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.year }}</td>
            <td>
                <a href="/books/{{ book.id }}">Show</a>
                <a href="/books/{{ book.id }}/edit">Edit</a>
                <a href="/books/{{ book.id }}/delete" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <hr>
    <a href="/">Back to Posts</a>
{% endblock %}
